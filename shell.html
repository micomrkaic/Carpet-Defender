<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Housekeeper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #08060f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    color: #aaa;
  }

  #game-wrap {
    position: relative;
    display: inline-block;
    line-height: 0;
  }

  canvas {
    display: block;
    /* Scale down on small screens, never scale up past native size */
    max-width: 100vw;
    max-height: 100vh;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: default;
    outline: none;
  }

  /* Make canvas fill the viewport in fullscreen */
  :fullscreen canvas,
  :-webkit-full-screen canvas {
    max-width:  100vw;
    max-height: 100vh;
    width:  auto !important;
    height: auto !important;
  }

  #controls {
    margin-top: 10px;
    font-size: 11px;
    color: #555;
    text-align: center;
    line-height: 1.7;
  }

  #fs-btn {
    margin-top: 8px;
    background: #1a1630;
    color: #887;
    border: 1px solid #332;
    padding: 4px 14px;
    font-family: monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
  }
  #fs-btn:hover { background: #241e40; color: #bb9; }

  /* spinner shown while wasm loads */
  #spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #08060f;
    color: #6655aa;
    font-size: 14px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="game-wrap">
  <canvas id="canvas" tabindex="0" oncontextmenu="return false;"></canvas>
  <div id="spinner">LOADING…</div>
</div>

<div id="controls">
  ← → / A D &nbsp; move &nbsp;|&nbsp; SPACE &nbsp; shoot &nbsp;|&nbsp;
  1 2 3 4 / ↑ ↓ &nbsp; select difficulty &nbsp;|&nbsp; R &nbsp; restart
</div>
<button id="fs-btn" onclick="toggleFS()">⛶ Fullscreen</button>

<script>
  // ── prevent browser scrolling on game keys ──────────────────
  window.addEventListener('keydown', function(e) {
    var blocked = [32,37,38,39,40];   // Space, Left, Up, Right, Down
    if (blocked.indexOf(e.keyCode) !== -1) e.preventDefault();
  }, { passive: false });

  // ── focus canvas on click anywhere on the page ───────────────
  var canvas = document.getElementById('canvas');
  document.addEventListener('click', function() { canvas.focus(); });
  // also focus as soon as the page loads
  window.addEventListener('load', function() { canvas.focus(); });

  // ── fullscreen toggle ────────────────────────────────────────
  function toggleFS() {
    var wrap = document.getElementById('game-wrap');
    if (!document.fullscreenElement) {
      (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }

  // ── Emscripten Module config ─────────────────────────────────
  var Module = {
    canvas: canvas,

    onRuntimeInitialized: function() {
      document.getElementById('spinner').style.display = 'none';
      canvas.focus();
    },

    // surface any load errors
    print:    function(t) { console.log(t); },
    printErr: function(t) { console.warn(t); },
  };
</script>

{{{ SCRIPT }}}

</body>
</html>
